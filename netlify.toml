[build]
  command = "npm run build"
  publish = "dist"

# Redirect /blog to /blog/ (trailing slash consistency)
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

# Custom 404
# [[redirects]]
#   from = "/*"
#   to = "/404"
#   status = 404

# Headers for performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
